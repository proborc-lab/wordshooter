<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Uitgeleerd?</title>
  <meta name="description" content="Spelletjes waar je stiekem iets van leert.">
  <link rel="stylesheet" href="css/site.css">
  <meta name="theme-color" content="#0b1310">
  <!-- Geen manifest: dit is een portal, geen app. Twee tegels wijzen naar
       andere sites, en een standalone app die zichzelf verlaat is verwarrend.
       De manifests horen bij de spellen zelf (zie wordshooter/). -->
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;rect width='16' height='16' fill='%230b1310'/&gt;&lt;rect x='7' y='2' width='2' height='4' fill='%23a0e080'/&gt;&lt;rect x='7' y='10' width='2' height='4' fill='%23a0e080'/&gt;&lt;rect x='2' y='7' width='4' height='2' fill='%23a0e080'/&gt;&lt;rect x='10' y='7' width='4' height='2' fill='%23a0e080'/&gt;&lt;/svg&gt;">
</head>
<body>

  <header class="site-head">
    <h1>Uitgeleerd<span class="q">?</span></h1>
    <p class="tagline">Spelletjes waar je stiekem iets van leert.</p>
  </header>

  <main>
    <ul class="tiles">

      <!-- ── 1. Wordshooter — hier op de site ─────────────────────────── -->
      <li class="tile" style="--accent:#a0e080">
        <a href="wordshooter/">
          <span class="art" aria-hidden="true">
            <svg viewBox="0 0 16 16">
              <rect x="7"  y="1"  width="2" height="4"/>
              <rect x="7"  y="11" width="2" height="4"/>
              <rect x="1"  y="7"  width="4" height="2"/>
              <rect x="11" y="7"  width="4" height="2"/>
              <rect x="6"  y="6"  width="4" height="4"/>
            </svg>
          </span>
          <span class="body">
            <span class="title">Wordshooter</span>
            <span class="sub">Schiet de goede vertaling aan flarden.</span>
          </span>
        </a>
      </li>

      <!-- ── 2. Ontwerp Je Stad — extern ──────────────────────────────── -->
      <li class="tile" style="--accent:#e0a860">
        <a href="https://ontwerpjestad.nl">
          <span class="art" aria-hidden="true">
            <!-- Skyline met ramen. De ramen zijn niet decoratief: zonder die
                 gaatjes is dit visueel hetzelfde plaatje als de staafjes van
                 Kabaal hiernaast. -->
            <svg viewBox="0 0 16 16">
              <rect x="0"  y="8" width="5" height="8"/>
              <rect x="6"  y="3" width="5" height="13"/>
              <rect x="12" y="6" width="4" height="10"/>
              <rect class="win" x="1"  y="10" width="2" height="1"/>
              <rect class="win" x="1"  y="13" width="2" height="1"/>
              <rect class="win" x="7"  y="5"  width="2" height="1"/>
              <rect class="win" x="7"  y="8"  width="2" height="1"/>
              <rect class="win" x="7"  y="11" width="2" height="1"/>
              <rect class="win" x="13" y="8"  width="2" height="1"/>
              <rect class="win" x="13" y="11" width="2" height="1"/>
            </svg>
          </span>
          <span class="body">
            <span class="title">Ontwerp Je Stad</span>
            <span class="sub">Bouw je stad en maak hem leefbaar.</span>
            <span class="away">andere site &#8599;</span>
          </span>
        </a>
      </li>

      <!-- ── 3. Kabaal — extern ───────────────────────────────────────── -->
      <li class="tile" style="--accent:#d08ce0">
        <a href="https://kabaal.app">
          <span class="art" aria-hidden="true">
            <!-- Een noot in plaats van staafjes: staafjes lijken te veel op een
                 skyline, en een noot zegt in één oogopslag "muziek". -->
            <svg viewBox="0 0 16 16">
              <rect x="2"  y="10" width="5" height="4"/>
              <rect x="7"  y="2"  width="2" height="9"/>
              <rect x="9"  y="2"  width="3" height="2"/>
              <rect x="11" y="4"  width="2" height="3"/>
            </svg>
          </span>
          <span class="body">
            <span class="title">Kabaal</span>
            <span class="sub">Muziek leren door te spelen.</span>
            <span class="away">andere site &#8599;</span>
          </span>
        </a>
      </li>

      <!-- ── 4. Nog leeg ──────────────────────────────────────────────── -->
      <li class="tile tile--soon">
        <span class="art" aria-hidden="true">
          <svg viewBox="0 0 16 16">
            <rect x="5" y="2"  width="6" height="2"/>
            <rect x="9" y="4"  width="2" height="3"/>
            <rect x="7" y="7"  width="4" height="2"/>
            <rect x="7" y="9"  width="2" height="2"/>
            <rect x="7" y="12" width="2" height="2"/>
          </svg>
        </span>
        <span class="body">
          <span class="title">Binnenkort</span>
          <span class="sub">Hier komt het volgende spel.</span>
        </span>
      </li>

    </ul>
  </main>

</body>
</html>
